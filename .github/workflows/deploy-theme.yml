# Deploy theme to Shopify development store when pushing to main
# Requires GitHub secrets: SHOPIFY_FLAG_STORE, SHOPIFY_CLI_THEME_TOKEN
# See README for setup (Theme Access app, store name)

name: Deploy theme to Shopify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Push theme to store
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Push theme
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_FLAG_STORE }}
          SHOPIFY_FLAG_FORCE: "1"
        run: |
          shopify theme push --store "$SHOPIFY_FLAG_STORE" --password "$SHOPIFY_CLI_THEME_TOKEN" --force
