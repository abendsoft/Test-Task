# Deploy to staging theme when pushing to staging branch
# Store: test-task-development.myshopify.com
# Create a duplicate theme in Shopify Admin for staging, then add its ID as SHOPIFY_STAGING_THEME_ID secret

name: Deploy to staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  deploy:
    name: Push to staging theme
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Push theme to staging
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_FLAG_STORE }}
          SHOPIFY_FLAG_THEME: ${{ secrets.SHOPIFY_STAGING_THEME_ID }}
          SHOPIFY_FLAG_FORCE: "1"
        run: shopify theme push --force --theme "$SHOPIFY_FLAG_THEME"
