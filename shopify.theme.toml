# Shopify CLI theme configuration
# Store: https://test-task-development.myshopify.com/

[environments.development]
store = "test-task-development"
# Main/production theme (deployed from main branch)
theme = "187032699252"

# Staging: create a duplicate theme in Shopify Admin for staging, then set its ID here
# CI deploys staging branch to that theme via SHOPIFY_STAGING_THEME_ID secret
[environments.staging]
store = "test-task-development"
# Set your staging theme ID after duplicating the main theme (optional for local dev)
# theme = ""

[environments.default]
store = "test-task-development"
theme = "187032699252"
